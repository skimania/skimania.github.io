<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cibachrome Print Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e0e;
            --card-bg: #161616;
            --border: #2a2a2a;
            --text: #e8e4dc;
            --muted: #7a7570;
            --accent: #c8a96e;
            --accent-dim: #7a6540;
            --red: #c0392b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            padding: 60px 40px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.04em;
            line-height: 1;
        }
        .header-title span {
            display: block;
            font-size: 0.9rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }
        .header-meta {
            text-align: right;
            color: var(--muted);
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 2;
        }

        /* FILTER BAR */
        .filter-bar {
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-right: 6px;
        }
        .filter-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }
        #search {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            outline: none;
            margin-left: auto;
            width: 200px;
            transition: border-color 0.2s;
        }
        #search::placeholder { color: var(--muted); }
        #search:focus { border-color: var(--accent); }

        /* SERIES HEADINGS */
        .series-heading {
            grid-column: 1 / -1;
            padding: 30px 0 12px;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        .series-heading h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.06em;
            color: var(--text);
        }
        .series-heading .series-count {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-dim);
        }
        .series-divider {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* GRID */
        .container { padding: 40px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2px;
        }

        .card {
            background: var(--card-bg);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            aspect-ratio: 4/3;
            transition: opacity 0.3s;
        }
        .card.hidden { display: none; }

        .card-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.3s;
            filter: saturate(0.85);
        }
        .card:hover .card-img {
            transform: scale(1.04);
            filter: saturate(1.1);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover .card-overlay { opacity: 1; }

        .card-number {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .card-listing-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.3;
            color: #fff;
        }
        .card-size {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            margin-top: 6px;
        }

        /* always-visible bottom strip */
        .card-footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 10px 14px;
            background: linear-gradient(transparent, rgba(0,0,0,0.75));
            transition: opacity 0.25s;
        }
        .card:hover .card-footer { opacity: 0; }
        .card-footer-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* damage badge */
        .damage-badge {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(192,57,43,0.85);
            color: #fff;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 3px 8px;
            backdrop-filter: blur(4px);
        }

        /* count */
        .results-count {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 20px;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(8,8,8,0.97);
            z-index: 1000;
            overflow-y: auto;
        }
        #lightbox.open { display: flex; }

        .lb-inner {
            margin: auto;
            max-width: 1100px;
            width: 100%;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
            min-height: 100vh;
        }

        .lb-img-side {
            position: sticky;
            top: 40px;
        }
        .lb-img-side img {
            width: 100%;
            display: block;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .lb-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
        }
        .lb-nav-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lb-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

        .lb-info-side {
            padding-top: 10px;
        }
        .lb-close {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 30px;
        }
        .lb-close-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 6px 0;
            transition: color 0.2s;
        }
        .lb-close-btn:hover { color: var(--text); }

        .lb-tag {
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }
        .lb-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .lb-original {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 30px;
            font-style: italic;
        }

        .lb-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        .lb-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }
        .lb-meta-item label {
            display: block;
            font-size: 0.58rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .lb-meta-item span {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--text);
        }
        .lb-meta-item.full { grid-column: 1 / -1; }

        .lb-condition {
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--muted);
        }
        .lb-condition.has-damage { color: #e07060; }

        .lb-description {
            font-size: 0.82rem;
            line-height: 1.8;
            color: #b0aca4;
            font-weight: 300;
        }

        .lb-counter {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-align: center;
            margin-top: 12px;
        }

        /* ZOOM OVERLAY */
        #zoom-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
        }
        #zoom-overlay.open { display: flex; }
        #zoom-img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            user-select: none;
        }
        #lb-img {
            cursor: zoom-in;
            transition: opacity 0.2s;
        }
        #lb-img:hover { opacity: 0.92; }

        @media (max-width: 800px) {
            header { padding: 30px 20px 24px; flex-direction: column; gap: 12px; }
            .header-meta { text-align: left; }
            .container { padding: 20px; }
            .filter-bar { padding: 14px 20px; }
            #search { margin-left: 0; width: 100%; }
            .lb-inner { grid-template-columns: 1fr; padding: 20px; gap: 30px; }
            .lb-img-side { position: static; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">
        <span>Estate Collection</span>
        Cibachrome Prints
    </div>
    <div class="header-meta">
        <div id="total-count">— prints</div>
        <div>Original Cibachrome / Ilfochrome</div>
        <div>Large Format Photography</div>
    </div>
</header>

<div class="filter-bar">
    <span class="filter-label">Series</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Botanical">Botanical</button>
    <button class="filter-btn" data-filter="Wildlife">Wildlife</button>
    <button class="filter-btn" data-filter="New York">New York</button>
    <button class="filter-btn" data-filter="Gaucho & Pampas">Gaucho</button>
    <button class="filter-btn" data-filter="Ireland & Europe">Ireland & Europe</button>
    <button class="filter-btn" data-filter="Nude Studies">Nudes</button>
    <button class="filter-btn" data-filter="Chalk Series">Chalk</button>
    <button class="filter-btn" data-filter="Hearts & Mesh">Hearts</button>
    <button class="filter-btn" data-filter="The Beatles">Beatles</button>
    <button class="filter-btn" data-filter="Surrealist Still Life">Surrealist</button>
    <button class="filter-btn" data-filter="World Portraiture">Portraiture</button>
    <button class="filter-btn" data-filter="Natural Landscapes">Natural Landscapes</button>
    <button class="filter-btn" data-filter="damage">⚠ Damaged</button>
    <input type="text" id="search" placeholder="Search...">
</div>

<div class="container">
    <div class="results-count" id="results-count"></div>
    <div class="grid" id="grid"></div>
</div>

<div id="lightbox">
    <div class="lb-inner">
        <div class="lb-img-side">
            <img id="lb-img" src="" alt="">
            <div class="lb-nav">
                <button class="lb-nav-btn" onclick="changeItem(-1)">← Prev</button>
                <div class="lb-counter" id="lb-counter"></div>
                <button class="lb-nav-btn" onclick="changeItem(1)">Next →</button>
            </div>
        </div>
        <div class="lb-info-side">
            <div class="lb-close">
                <button class="lb-close-btn" onclick="closeLightbox()">✕ Close</button>
            </div>
            <div class="lb-tag" id="lb-tag"></div>
            <div class="lb-title" id="lb-title"></div>
            <div class="lb-original" id="lb-original"></div>
            <hr class="lb-divider">
            <div class="lb-meta-grid">
                <div class="lb-meta-item">
                    <label>Width</label>
                    <span id="lb-width"></span>
                </div>
                <div class="lb-meta-item">
                    <label>Height</label>
                    <span id="lb-height"></span>
                </div>
                <div class="lb-meta-item full">
                    <label>Condition</label>
                    <div class="lb-condition" id="lb-condition"></div>
                </div>
            </div>
            <hr class="lb-divider">
            <div class="lb-description" id="lb-description"></div>
        </div>
    </div>
</div>

<div id="zoom-overlay" onclick="closeZoom()">
    <img id="zoom-img" src="" alt="">
</div>

<script>
let items = [];
let filtered = [];
let currentIndex = 0;
let activeFilter = 'all';
let searchTerm = '';

const SERIES_ORDER = [
    'Botanical','Wildlife','Hearts & Mesh','Chalk Series','New York',
    'Gaucho & Pampas','Ireland & Europe','Natural Landscapes',
    'World Portraiture','The Beatles','Nude Studies','Surrealist Still Life',
    'Panoramics','Uncategorised'
];

async function init() {
    const res = await fetch('catalog.json');
    const data = await res.json();
    items = data.items;
    filtered = [...items];
    document.getElementById('total-count').textContent = `${items.length} prints`;
    renderGrid();
}

function applyFilters() {
    filtered = items.filter(item => {
        const hasDamage = item.condition && item.condition.toLowerCase().includes('damage');
        const matchesSearch = !searchTerm ||
            item.listing_name.toLowerCase().includes(searchTerm) ||
            item.original_title.toLowerCase().includes(searchTerm) ||
            (item.series || '').toLowerCase().includes(searchTerm) ||
            item.description.toLowerCase().includes(searchTerm);
        if (!matchesSearch) return false;
        if (activeFilter === 'damage') return hasDamage;
        if (activeFilter === 'all') return true;
        return item.series === activeFilter;
    });
    renderGrid();
}

function renderGrid() {
    const grid = document.getElementById('grid');
    const count = document.getElementById('results-count');
    count.textContent = `${filtered.length} of ${items.length} prints`;
    grid.innerHTML = '';

    const showSeries = activeFilter === 'all' && !searchTerm;

    if (showSeries) {
        // Group by series
        const groups = {};
        SERIES_ORDER.forEach(s => groups[s] = []);
        filtered.forEach(item => {
            const s = item.series || 'Uncategorised';
            if (groups[s]) groups[s].push(item);
        });

        SERIES_ORDER.forEach(series => {
            const group = groups[series];
            if (!group || group.length === 0) return;

            // Series heading spans full grid width
            const heading = document.createElement('div');
            heading.className = 'series-heading';
            heading.innerHTML = `
                <h2>${series}</h2>
                <span class="series-count">${group.length} print${group.length > 1 ? 's' : ''}</span>
                <div class="series-divider"></div>
            `;
            grid.appendChild(heading);

            group.forEach(item => grid.appendChild(makeCard(item)));
        });
    } else {
        filtered.forEach(item => grid.appendChild(makeCard(item)));
    }
}

function makeCard(item) {
    const hasDamage = item.condition && item.condition.toLowerCase().includes('damage');
    const shortTitle = item.listing_name.split('—')[0].trim();
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.uid = item.uid;
    card.innerHTML = `
        <img class="card-img" src="images/${item.main_photo}"
             alt="${item.listing_name}"
             loading="lazy"
             onerror="this.src='https://via.placeholder.com/400x300/161616/333?text=No+Image'">
        <div class="card-overlay">
            <div class="card-number">No. ${item.number} — ${item.size_label}</div>
            <div class="card-listing-name">${shortTitle}</div>
        </div>
        <div class="card-footer">
            <div class="card-footer-title">${shortTitle}</div>
        </div>
        ${hasDamage ? '<div class="damage-badge">Condition</div>' : ''}
    `;
    card.addEventListener('click', () => openLightbox(item.uid));
    return card;
}

function openLightbox(uid) {
    const idx = filtered.findIndex(i => i.uid === uid);
    if (idx === -1) return;
    currentIndex = idx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
}

function changeItem(dir) {
    currentIndex = (currentIndex + dir + filtered.length) % filtered.length;
    updateLightbox();
    document.querySelector('.lb-inner').scrollTop = 0;
    document.getElementById('lightbox').scrollTop = 0;
}

function updateLightbox() {
    const item = filtered[currentIndex];
    const hasDamage = item.condition && item.condition.toLowerCase().includes('damage');

    document.getElementById('lb-img').src = `images/${item.main_photo}`;
    document.getElementById('lb-img').alt = item.listing_name;
    document.getElementById('lb-tag').textContent = `No. ${item.number} · ${item.series || 'Cibachrome Print'}`;
    document.getElementById('lb-title').textContent = item.listing_name.split('—')[0].trim();
    document.getElementById('lb-original').textContent = `Original catalog title: "${item.original_title}"`;
    document.getElementById('lb-width').textContent = item.width_ft ? `${item.width_ft} ft` : '—';
    document.getElementById('lb-height').textContent = item.height_ft ? `${item.height_ft} ft` : '—';
    const condEl = document.getElementById('lb-condition');
    condEl.textContent = item.condition || 'Good';
    condEl.className = 'lb-condition' + (hasDamage ? ' has-damage' : '');
    document.getElementById('lb-description').textContent = item.description;
    document.getElementById('lb-counter').textContent = `${currentIndex + 1} / ${filtered.length}`;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        applyFilters();
    });
});

// Search
document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase().trim();
    applyFilters();
});

function openZoom() {
    const src = document.getElementById('lb-img').src;
    document.getElementById('zoom-img').src = src;
    document.getElementById('zoom-overlay').classList.add('open');
}
function closeZoom() {
    document.getElementById('zoom-overlay').classList.remove('open');
}

// Keyboard nav
document.addEventListener('keydown', e => {
    if (document.getElementById('zoom-overlay').classList.contains('open')) {
        closeZoom(); return;
    }
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') changeItem(-1);
    if (e.key === 'ArrowRight') changeItem(1);
    if (e.key === 'Escape') closeLightbox();
});

document.getElementById('lb-img').addEventListener('click', openZoom);

init();
</script>
</body>
</html>

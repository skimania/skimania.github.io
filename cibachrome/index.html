<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Portfolio Catalog</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; margin: 0; letter-spacing: -0.02em; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1);
        }
        .img-box {
            aspect-ratio: 1/1;
            background: #f1f5f9;
            overflow: hidden;
        }
        .img-box img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .info { padding: 16px; }
        .title { font-weight: 600; margin-bottom: 4px; }
        .id { font-family: monospace; font-size: 0.7rem; color: var(--text-muted); }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        .lb-content {
            position: relative;
            max-width: 90%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #lb-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        #lb-caption {
            color: white;
            margin-top: 20px;
            font-size: 1.2rem;
            text-align: center;
        }
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 20px;
            cursor: pointer;
            font-size: 2rem;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        #prev { left: -80px; }
        #next { right: -80px; }
        #close {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        #status-message {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }

        @media (max-width: 800px) {
            #prev, #next { top: auto; bottom: -80px; transform: none; }
            #prev { left: 20%; }
            #next { right: 20%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header id="header">
            <h1 id="project-title">Loading Portfolio...</h1>
            <p id="project-meta" style="color: var(--text-muted)"></p>
        </header>
        
        <div id="status-message">Loading data.json...</div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="lightbox">
        <div class="lb-content">
            <button id="close" onclick="closeLightbox()">&times; Close</button>
            <button id="prev" class="nav-btn" onclick="changeImg(-1)">&#10094;</button>
            <img id="lb-img" src="" alt="">
            <button id="next" class="nav-btn" onclick="changeImg(1)">&#10095;</button>
            <div id="lb-caption"></div>
        </div>
    </div>

    <script>
        let items = [];
        let currentIndex = 0;

        async function init() {
            const status = document.getElementById('status-message');
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Failed to load data.json');
                const data = await response.json();
                
                const project = data.projects[0];
                items = project.items;
                
                // Numerical Sorting
                items.sort((a, b) => {
                    const numA = parseInt(a.title.match(/^(\d+)/)) || 9999;
                    const numB = parseInt(b.title.match(/^(\d+)/)) || 9999;
                    return numA - numB;
                });

                document.getElementById('project-title').innerText = project.title;
                document.getElementById('project-meta').innerText = `${items.length} assets cataloged`;
                
                renderGrid();
                status.style.display = 'none';
            } catch (err) {
                console.error(err);
                status.innerHTML = `
                    <div style="color: #ef4444; border: 1px solid #fee2e2; padding: 20px; border-radius: 8px; background: #fef2f2;">
                        <strong>Error loading data.json</strong><br>
                        ${err.message}<br><br>
                        <small>Note: If you are opening this file directly from your disk (file://), modern browsers block 'fetch' for security. <br>Please use a local web server (like VS Code Live Server or 'python -m http.server').</small>
                    </div>
                `;
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map((item, index) => `
                <div class="card" onclick="openLightbox(${index})">
                    <div class="img-box">
                        <img src="images/${item.main_photo}" alt="${item.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                    </div>
                    <div class="info">
                        <div class="title">${item.title}</div>
                        <div class="id">${item.uid}</div>
                    </div>
                </div>
            `).join('');
        }

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            const item = items[currentIndex];
            document.getElementById('lb-img').src = "images/" + item.main_photo;
            document.getElementById('lb-caption').innerText = item.title;
        }

        function changeImg(dir) {
            currentIndex += dir;
            if (currentIndex < 0) currentIndex = items.length - 1;
            if (currentIndex >= items.length) currentIndex = 0;
            updateLightbox();
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'ArrowLeft') changeImg(-1);
                if (e.key === 'ArrowRight') changeImg(1);
                if (e.key === 'Escape') closeLightbox();
            }
        });

        init();
    </script>
</body>
</html>
